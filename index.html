<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Adaptive Cricket</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #222;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 50px;
        }
        
        .ui-container {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        #status {
            color: #FFC107;
        }

        .game-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        canvas {
            background-color: #4CAF50; 
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .history-panel {
            background-color: #333;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 15px;
            width: 200px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .history-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.2rem;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }

        #historyList {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        #historyList li {
            background-color: #444;
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="ui-container">
        <div>Score: <span id="score">0</span></div>
        <div id="status">Press SPACE to swing!</div>
    </div>
    
    <div class="game-layout">
        <canvas id="gameCanvas" width="800" height="300"></canvas>

        <div class="history-panel">
            <h3>Past 10 Scores</h3>
            <ul id="historyList">
                <li>No games played yet</li>
            </ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game State Variables
        let score = 0;
        let pastScores = []; 
        
        const hitZone = { x: 650, width: 100 }; 
        const hitCenter = hitZone.x + (hitZone.width / 2); // Exact middle (700)

        let ball = { 
            x: 0, 
            y: 150, 
            speed: 6, 
            radius: 12, 
            active: true,
            isHit: false, // Tracks if the ball was successfully struck
            vx: 0, // Hit velocity X
            vy: 0, // Hit velocity Y
            swingAmplitude: 0
        };

        // Bat Variables for Animation
        let bat = {
            x: 700,
            y: 60,
            width: 14,
            height: 110,
            angle: -Math.PI / 4,
            isSwinging: false,
            swingProgress: 0
        };
        
        const statusEl = document.getElementById("status");
        const historyListEl = document.getElementById("historyList");

        document.addEventListener("keydown", (event) => {
            if (event.code === "Space") {
                event.preventDefault(); 
                if (ball.active && !bat.isSwinging) {
                    bat.isSwinging = true; 
                    bat.swingProgress = 0;
                    
                    // Only check for a hit if the ball hasn't already been hit
                    if (!ball.isHit) {
                        checkHit();
                    }
                }
            }
        });

        function checkHit() {
            const distance = Math.abs(ball.x - hitCenter);

            if (distance <= 30) {
                // SUCCESSFUL HIT
                score += 1;
                document.getElementById("score").innerText = score;
                statusEl.innerText = "CRACK! GREAT HIT!";
                statusEl.style.color = "#00FF00"; 
                
                // Trigger physics trajectory
                ball.isHit = true;
                
                // Depending on timing, angle the hit slightly differently
                let hitAngle = (ball.x - hitCenter) * 0.1; 
                ball.vx = -12 - Math.random() * 5; // Shoot backwards fast
                ball.vy = -8 + hitAngle; // Shoot upwards with slight variation

            } else if (ball.x >= hitZone.x && ball.x <= hitZone.x + hitZone.width) {
                handleGameOver("OFF CENTER! Score Reset.");
            } else {
                handleGameOver("SWUNG AT AIR! Score Reset.");
            }
        }

        function handleGameOver(reasonMsg) {
            pastScores.unshift(score); 
            
            if (pastScores.length > 10) {
                pastScores.pop();
            }

            updateHistoryUI();

            statusEl.innerText = reasonMsg;
            statusEl.style.color = "#FF5252";
            score = 0;
            document.getElementById("score").innerText = score;
            
            setTimeout(() => { resetBall(); }, 400);
        }

        function updateHistoryUI() {
            historyListEl.innerHTML = ""; 
            pastScores.forEach((savedScore, index) => {
                const li = document.createElement("li");
                li.innerText = `Game ${pastScores.length - index}: ${savedScore} runs`;
                historyListEl.appendChild(li);
            });
        }

        function resetBall() {
            ball.x = 0;
            ball.y = 150;
            ball.isHit = false;
            bat.isSwinging = false;
            bat.angle = -Math.PI / 4; 
            
            let baseSpeed = 5 + (score * 0.6); 
            ball.speed = Math.random() * 2 + baseSpeed; 
            
            // Sets the height of the curve (up to 150px up or down)
            ball.swingAmplitude = (Math.random() - 0.5) * 200; 
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Hit Zone and Center Line
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            ctx.fillRect(hitZone.x, 0, hitZone.width, canvas.height);
            ctx.fillStyle = "rgba(255, 0, 0, 0.6)";
            ctx.fillRect(hitCenter - 2, 0, 4, canvas.height);

            // Ball Physics & Rendering
            if (ball.active) {
                
                if (!ball.isHit) {
                    // INCOMING PITCH PHYSICS
                    ball.x += ball.speed;
                    // The math below guarantees the ball arcs but always lands perfectly at y=150 when x reaches hitCenter
                    ball.y = 150 + Math.sin((ball.x / hitCenter) * Math.PI) * ball.swingAmplitude;
                    
                    // Missed without swinging
                    if (ball.x > canvas.width + ball.radius && !bat.isSwinging) {
                        handleGameOver("TOO LATE! Score Reset."); 
                    }
                } else {
                    // HIT BALL PHYSICS (Trajectory off the bat)
                    ball.x += ball.vx;
                    ball.y += ball.vy;
                    ball.vy += 0.4; // Gravity pulls the ball down

                    // Reset the ball once it flies off the screen
                    if (ball.x < -50 || ball.y > canvas.height + 50) {
                        resetBall();
                    }
                }

                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = "white";
                ctx.fill();
                ctx.closePath();
            }

            // Bat Animation & Rendering
            if (bat.isSwinging) {
                bat.swingProgress += 0.15; 
                bat.angle = -Math.PI / 4 + (bat.swingProgress * Math.PI / 1.5);

                if (bat.swingProgress >= 1) {
                    bat.isSwinging = false; 
                }
            }

            ctx.save();
            ctx.translate(bat.x, bat.y); 
            ctx.rotate(bat.angle); 
            
            ctx.fillStyle = "#D2B48C"; 
            ctx.fillRect(-bat.width / 2, 0, bat.width, bat.height);
            ctx.fillStyle = "#222";
            ctx.fillRect(-bat.width / 2, 0, bat.width, 35);
            
            ctx.restore();

            requestAnimationFrame(gameLoop);
        }

        // Initialize and start
        resetBall();
        gameLoop();
    </script>
</body>
</html>
